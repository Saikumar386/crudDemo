# ===== MySQL Datasource =====
# createDatabaseIfNotExist=true will create the database automatically on first connection
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:crudDemo}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:Admin@123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== JPA / Hibernate =====
# update -> auto creates/updates tables based on entities (good for dev)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ===== Server =====
server.port=8080
